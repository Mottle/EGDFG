out_dir: results
metric_best: accuracy
metric_agg: argmax
wandb:
  use: True
  project: DD-EGDFG
dataset:
  format: PyG-TUDataset
  name: DD
  task: graph
  task_type: classification
  transductive: False
  split_mode: random
  split: [0.8, 0.1, 0.1]
  node_encoder: False
  edge_encoder: False
train:
  mode: custom
  batch_size: 64
  eval_period: 1
  ckpt_period: 100
model:
  type: generic_gnn
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: mean
gnn:
  head: graph
  layer_type: egdfg
  layers_pre_mp: 0
  layers_mp: 4
  dim_inner: 128
  batchnorm: True
  norm_type: batchnorm
  act: relu
  dropout: 0.15
  agg: mean
  normalize_adj: False
  residual: True
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 5e-5
  base_lr: 0.001
  max_epoch: 300
  scheduler: reduce_on_plateau
  reduce_factor: 0.5
  schedule_patience: 20
  min_lr: 1e-6
