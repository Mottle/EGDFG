out_dir: results
metric_best: auc
metric_agg: argmax
wandb:
  use: True
  project: molhiv-EGDFG
dataset:
  format: OGB
  name: ogbg-molhiv
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: Atom
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Bond
  edge_encoder_bn: False
train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_period: 100
model:
  type: generic_gnn
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: mean
gnn:
  head: graph
  layer_type: egdfg
  layers_pre_mp: 0
  layers_mp: 5
  dim_inner: 64
  batchnorm: True
  norm_type: batchnorm
  act: relu
  dropout: 0.0
  agg: mean
  normalize_adj: False
  residual: True
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.0001
  max_epoch: 100
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
